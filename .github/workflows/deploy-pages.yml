name: Deploy a GitHub Pages

# Publica el sitio (tienda + /studio) en GitHub Pages.
# Se ejecuta al pushear a la rama de trabajo y también a mano.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un deploy a la vez.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir artefacto (todo el repo)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
