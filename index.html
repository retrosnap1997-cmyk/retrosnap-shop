<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F0A0A">
  <title>RetroSnap · Panel</title>
  <meta name="description" content="Panel de RetroSnap Surf Goodies — Studio y Tienda.">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="panel.css">
</head>
<body>

  <!-- ================= HERO ================= -->
  <header class="hero">
    <div class="hero-inner">
      <div class="logo-card">
        <img src="assets/logo.jpg" alt="RetroSnap · Surf Goodies" width="1472" height="832">
      </div>
      <p class="tagline">SURF GOODIES · SANTA TERESA, CR</p>
    </div>
  </header>

  <!-- ================= PANEL ================= -->
  <main class="panel">
    <p class="intro">¿A dónde vamos?</p>

    <nav class="cta" aria-label="Secciones de RetroSnap">
      <a class="card card-studio" href="studio/">
        <span class="card-ico">📷</span>
        <span class="card-main">
          <strong>Studio</strong>
          <small>Sacá fotos, recortá el fondo y cargá tu stock.</small>
        </span>
        <span class="card-go">Entrar</span>
      </a>

      <a class="card card-tienda" href="tienda/">
        <span class="card-ico">🛍️</span>
        <span class="card-main">
          <strong>Tienda</strong>
          <small>Mirá el catálogo online y compartilo.</small>
        </span>
        <span class="card-go">Ver</span>
      </a>
    </nav>

    <section class="prox">
      <h2>Próximamente</h2>
      <div class="chips">
        <span class="chip">📲 Instagram</span>
        <span class="chip">📦 Pedidos</span>
        <span class="chip">📊 Reportes</span>
        <span class="chip">🏷️ Etiquetas</span>
      </div>
    </section>
  </main>

  <footer class="pie">
    <span>© <span id="anio"></span> RetroSnap Surf Goodies · Santa Teresa, Costa Rica</span>
  </footer>

  <script>document.getElementById("anio").textContent = new Date().getFullYear();</script>
</body>
</html>
